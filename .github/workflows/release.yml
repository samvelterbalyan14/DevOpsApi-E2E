name: Production Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Release Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.ref_name }} .

      - name: Push Release Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.ref_name }}

      - name: Deploy Release
        run: |
          kubectl set image deployment/devopsapi \
          devopsapi=${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.ref_name }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/devopsapi
