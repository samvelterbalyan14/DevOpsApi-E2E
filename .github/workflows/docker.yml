name: Build and Deploy Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image (SHA)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }} .

      - name: Push Image (SHA)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }}

      - name: Apply Base Deployment
        run: |
          kubectl apply -f deployment.yaml

      - name: Deploy SHA Version
        run: |
          kubectl set image deployment/devopsapi \
          devopsapi=${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/devopsapi
