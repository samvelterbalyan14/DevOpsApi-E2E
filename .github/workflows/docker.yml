name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapi-e2e:latest
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
